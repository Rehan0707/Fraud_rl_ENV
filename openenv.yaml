name: fraud_rl
description: >
  Standardized RL environment for Detecting Fraudulent Transactions. 
  Simulates a real-world fintech workflow with risk markers (amount, location, frequency).
version: 1.0.0
standard_version: 1.0.0
tags: ["fraud", "fintech", "classification", "meta-pytorch-hackathon"]
entry_point: fraud_env.environment:FraudEnvironment
action_space:
  type: discrete
  size: 2
  mapping:
    0: approve_transaction
    1: flag_as_fraud
observation_space:
  type: object
  properties:
    amount:
      type: integer
      minimum: 10
      maximum: 1000
    location_risk:
      type: integer
      enum: [0, 1]
    frequency:
      type: integer
      minimum: 1
      maximum: 10
    reward:
      type: number
    done:
      type: boolean
